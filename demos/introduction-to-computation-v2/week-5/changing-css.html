<body>
	<p id="rhino">
		I’m a big font!
	</p>

	<p class="hippo">
		I’m a colorful font!
	</p>

	<script>
		// Target an element by ID and change it font size to a random number
		document.querySelector("#rhino").style.fontSize = "50px";

		// Target an element by class and change it font size to a random color
		document.querySelector(".hippo").style.color = "rgb(255, 0, 0)";
	</script>
</body>
