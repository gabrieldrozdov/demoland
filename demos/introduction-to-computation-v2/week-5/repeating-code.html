<body>
	<style>
		#rhino {
			transition: .5s;
		}
	</style>

	<p id="rhino">
		We’re going full rando!!
	</p>

	<script>
		function getRandomNumber(min, max) {
			let range = max-min;
			return (Math.random() * range) + min
		}

		function getRoundedRandomNumber(min, max) {
			let range = max-min;
			return Math.floor( (Math.random() * range) + min )
		}

		function randomizeStyles() {
			let rhino = document.querySelector("#rhino");
			let rhinoSize = getRandomNumber(10, 100) + "px";
			let hippoRed = getRoundedRandomNumber(0, 255);
			let hippoGreen = getRoundedRandomNumber(0, 255);
			let hippoBlue = getRoundedRandomNumber(0, 255);
			
			rhino.style.fontSize = rhinoSize;
			rhino.style.color = "rgb(" + hippoRed + "," + hippoGreen + "," + hippoBlue + ")";
		}

		setInterval(randomizeStyles, 500);
	</script>
</body>
