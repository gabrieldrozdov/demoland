	<script>
		// wait until the user clicks on the screen before showing content
		let handshake = document.querySelector("#handshake");
		handshake.addEventListener('click', function() {
			Tone.start();
			handshake.style.display = 'none';
		});

		// create a synth using tone.js
		let synth = new Tone.Synth().toDestination();

		// target all buttons
		let buttons = document.querySelectorAll('.playButton');

		// the note we’re going to start from
		let currentNote = 100;

		// do something to all the buttons
		buttons.forEach(function(button) {

			// store the note in this scope
			// (otherwise, it’ll just play the final value of currentNote and all the buttons will make the same sound)
			let storedNote = currentNote;

			// when the buttons are hovered, play that note
			button.addEventListener('mouseenter', function() {
				synth.triggerAttackRelease(storedNote, "8n");
			});

			// go up by one note (or octave if needed)
			currentNote += 10;

		})
	</script>
