<body>
	<script>
		let greetings = [
			"Hello!",
			"Howdy!",
			"Bonjour!",
			"Hola!",
			"Aloha!"
		];

		function randomItem(array) {
			let randomIndex = Math.floor(Math.random()*array.length);
			return array[randomIndex];
		}

		setInterval(function() {
			let body = document.querySelector('body');
			body.innerHTML += randomItem(greetings) + " ";
		}, 50)
	</script>
</body>
