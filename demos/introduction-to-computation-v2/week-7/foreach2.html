<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<div class="container"></div>
	<script>
		let container = document.querySelector('.container');

		let chores = [
			"groceries",
			"walking the dog",
			"dishes",
			"laundry"
		]

		chores.forEach(function(item) {
			container.innerHTML += item + " ";
		})
	</script>
</body>
</html>
