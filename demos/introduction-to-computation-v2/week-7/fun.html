<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		.container {
			display: flex;
			flex-wrap: wrap;
			align-items: end;
		}
		.container div {
			border: 5px solid black;
		}
	</style>
</head>
<body>
	<div class="container">
		<div></div>
		<div></div>
		<div></div>
		<div></div>
		<div></div>
		<div></div>
		<div></div>
		<div></div>
	</div>

	<script>
		let allChildren = document.querySelectorAll('.container div');

		allChildren.forEach(function(item) {
			item.style.width = Math.random()*300 + 'px';
			item.style.height = Math.random()*300 + "px";
		})
	</script>
</body>
</html>
