<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
	<script>
		let index = 0;

		// These are all the same
		index++;
		index = index+1;
		index += 1;

		// These are all the same
		index--;
		index = index-1;
		index -= 1;
	</script>
</body>
