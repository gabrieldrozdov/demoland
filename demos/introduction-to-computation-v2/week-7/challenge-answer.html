<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	<script>
		// ———————————————————
		// CHALLENGE 1
		// Write a “while” loop that logs to the console every number from -50 to 50

		let i = -50;
		while (i<50) {
			console.log(i);
			i++;
		}

		// ———————————————————
		// CHALLENGE 2
		// Write a “for” loop that logs to the console every OTHER number from 0 to 100

		for (let i=0; i<100; i++) {
			console.log(i);
		}

		// ———————————————————
		// CHALLENGE 3
		// Write a “forEach” loop that logs every item from the following array
		let puzzleGames = [
			'baba is you',
			'return of the obra dinn',
			'stephen’s sausage roll',
			'the witness',
			'chants of sennaar'
		];

		puzzleGames.forEach((item) => {
			console.log(item)
		});
		
	</script>
</body>
</html>
